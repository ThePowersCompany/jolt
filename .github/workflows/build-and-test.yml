name: CI

on:
  pull_request:

permissions:
  id-token: write
  contents: read
  checks: read

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust formatting
        run: cargo fmt --check

      - name: Rust workspace check
        run: cargo check --workspace --all-targets

      - name: Build example Docker image
        run: docker build -t joltr-basic-example:ci -f examples/basic/Dockerfile .

      - name: TypeScript container integration
        run: JOLTR_BASIC_IMAGE=joltr-basic-example:ci JOLTR_BASIC_SKIP_DOCKER_BUILD=1 examples/basic/integration/run.sh
